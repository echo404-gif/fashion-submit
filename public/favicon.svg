<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="32" height="32" shape-rendering="crispEdges">
  <!-- Yellow heart pixels -->
  <!-- row 2: bumps -->
  <rect x="3" y="2" width="3" height="1" fill="#FFE000"/>
  <rect x="10" y="2" width="3" height="1" fill="#FFE000"/>
  <!-- row 3 -->
  <rect x="2" y="3" width="5" height="1" fill="#FFE000"/>
  <rect x="9" y="3" width="5" height="1" fill="#FFE000"/>
  <!-- row 4: crack at col 8 -->
  <rect x="2" y="4" width="6" height="1" fill="#FFE000"/>
  <rect x="9" y="4" width="5" height="1" fill="#FFE000"/>
  <!-- row 5: crack at col 7 -->
  <rect x="2" y="5" width="5" height="1" fill="#FFE000"/>
  <rect x="8" y="5" width="6" height="1" fill="#FFE000"/>
  <!-- row 6: crack at col 8 -->
  <rect x="3" y="6" width="5" height="1" fill="#FFE000"/>
  <rect x="9" y="6" width="4" height="1" fill="#FFE000"/>
  <!-- row 7: crack at col 7 -->
  <rect x="4" y="7" width="3" height="1" fill="#FFE000"/>
  <rect x="8" y="7" width="4" height="1" fill="#FFE000"/>
  <!-- row 8: crack at col 8 -->
  <rect x="5" y="8" width="3" height="1" fill="#FFE000"/>
  <rect x="9" y="8" width="2" height="1" fill="#FFE000"/>
  <!-- row 9: crack at col 7 -->
  <rect x="6" y="9" width="1" height="1" fill="#FFE000"/>
  <rect x="8" y="9" width="2" height="1" fill="#FFE000"/>
  <!-- row 10: tip -->
  <rect x="7" y="10" width="2" height="1" fill="#FFE000"/>
  <!-- row 11: point -->
  <rect x="7" y="11" width="1" height="1" fill="#FFE000"/>

  <!-- Crack pixels (zigzag) -->
  <rect x="8" y="4" width="1" height="1" fill="#111111"/>
  <rect x="7" y="5" width="1" height="1" fill="#111111"/>
  <rect x="8" y="6" width="1" height="1" fill="#111111"/>
  <rect x="7" y="7" width="1" height="1" fill="#111111"/>
  <rect x="8" y="8" width="1" height="1" fill="#111111"/>
  <rect x="7" y="9" width="1" height="1" fill="#111111"/>
</svg>
